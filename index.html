<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Guitar Chord Master - Position Fixed</title>
    <script src="https://unpkg.com/vexchords/dist/vexchords.dev.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonaljs/tonal/browser/tonal.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .controls { margin-bottom: 30px; background: white; padding: 20px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { padding: 12px; width: 320px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #chord-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .chord-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); cursor: pointer; min-width: 180px; transition: transform 0.1s; border: 2px solid transparent; }
        .chord-card:hover { transform: scale(1.02); border-color: #007bff; }
        .chord-name { margin: 0 0 10px 0; font-size: 1.4em; color: #007bff; font-weight: bold; }
        .voicing-hint { font-size: 11px; color: #888; margin-top: 10px; }
        /* 数字表示を見やすく */
        svg text { font-weight: bold !important; font-size: 14px !important; transform: translateX(-6px); }
    </style>
</head>
<body>

    <h1>ギターコード表示 (ポジション最適化)</h1>
    <div class="controls">
        <input type="text" id="progression" placeholder="例: C G Am F" value="C G Am F">
        <button onclick="updateChords()">表示</button>
        <p class="voicing-hint">※3フレット以降は自動的に数字表示に切り替わり、図のはみ出しを防ぎます</p>
    </div>

    <div id="chord-container"></div>

    <script>
        let voicingState = {};

        // 優先される基本ローコード
        const OPEN_CHORDS = {
            "C": [null, 3, 2, 0, 1, 0], "Am": [null, 0, 2, 2, 1, 0],
            "G": [3, 2, 0, 0, 0, 3], "Em": [0, 2, 2, 0, 0, 0],
            "E": [0, 2, 2, 1, 0, 0], "D": [null, null, 0, 2, 3, 2],
            "Dm": [null, null, 0, 2, 3, 1], "A": [null, 0, 2, 2, 2, 0],
            "F": [1, 3, 3, 2, 1, 1], "G7": [3, 2, 0, 0, 0, 1],
            "C7": [null, 3, 2, 3, 1, 0], "D7": [null, null, 0, 2, 1, 2],
            "E7": [0, 2, 0, 1, 0, 0], "A7": [null, 0, 2, 0, 2, 0]
        };

        const SHAPES = {
            "E": { "major": [0, 2, 2, 1, 0, 0], "minor": [0, 2, 2, 0, 0, 0], "7": [0, 2, 0, 1, 0, 0], "maj7": [0, 2, 1, 1, 0, null], "m7": [0, 2, 0, 0, 0, 0], "sus4": [0, 2, 2, 2, 0, 0], "dim": [0, 1, 2, 0, null, null] },
            "A": { "major": [null, 0, 2, 2, 2, 0], "minor": [null, 0, 2, 2, 1, 0], "7": [null, 0, 2, 0, 2, 0], "maj7": [null, 0, 2, 1, 2, 0], "m7": [null, 0, 2, 0, 1, 0], "sus4": [null, 0, 2, 2, 3, 0], "dim": [null, 0, 1, 2, 1, null] },
            "D": { "major": [null, null, 0, 2, 3, 2], "minor": [null, null, 0, 2, 3, 1], "7": [null, null, 0, 2, 1, 2], "maj7": [null, null, 0, 2, 2, 2], "m7": [null, null, 0, 2, 1, 1], "sus4": [null, null, 0, 2, 3, 3], "dim": [null, null, 0, 1, 1, 1] }
        };

        function getAllVoicings(chordName) {
            const chord = Tonal.Chord.get(chordName);
            if (chord.empty) return [];
            let voicings = [];
            if (OPEN_CHORDS[chordName]) {
                voicings.push({ frets: OPEN_CHORDS[chordName], minFret: -1 });
            }
            let type = "major";
            if (chord.type.includes("minor seventh")) type = "m7";
            else if (chord.type.includes("major seventh")) type = "maj7";
            else if (chord.type.includes("minor")) type = "minor";
            else if (chord.type.includes("seventh")) type = "7";
            else if (chord.type.includes("suspended")) type = "sus4";
            else if (chord.type.includes("diminished")) type = "dim";
            const rootChroma = Tonal.Note.chroma(chord.tonic);
            const stringBaseNotes = [4, 9, 2, 7, 11, 4];
            ["E", "A", "D"].forEach(style => {
                const shape = SHAPES[style][type] || SHAPES[style]["major"];
                const rootStringIdx = (style === "E") ? 0 : (style === "A" ? 1 : 2);
                let offset = rootChroma - stringBaseNotes[rootStringIdx];
                while (offset < 0) offset += 12;
                const fullFrets = shape.map(f => f === null ? null : f + offset);
                if (!voicings.some(v => JSON.stringify(v.frets) === JSON.stringify(fullFrets))) {
                    const active = fullFrets.filter(f => f !== null && f > 0);
                    const minFret = active.length > 0 ? Math.min(...active) : 0;
                    voicings.push({ frets: fullFrets, minFret: minFret });
                }
            });
            return voicings.sort((a, b) => a.minFret - b.minFret).map(v => v.frets);
        }

        function drawChord(name, container) {
            if (!voicingState[name]) voicingState[name] = 0;
            const allVoicings = getAllVoicings(name);
            if (allVoicings.length === 0) return;
            const frets = allVoicings[voicingState[name] % allVoicings.length];

            const activeFrets = frets.filter(f => f !== null && f > 0);
            const minFret = activeFrets.length > 0 ? Math.min(...activeFrets) : 0;

            // --- 修正箇所：数字表示への切り替え閾値を 2フレット超（つまり3フレット以降）に設定 ---
            let baseFret = minFret > 2 ? minFret : 0;
            
            const chordFormat = frets.map((f, i) => {
                const stringNum = 6 - i;
                if (f === null) return [stringNum, 'x'];
                // baseFret（開始位置）が決まったら、そこからの相対位置で丸を描画
                // (例: f=5, baseFret=3 なら、図の中では 5-3+1 = 3フレット目に描画)
                return [stringNum, (f > 0 && baseFret > 0) ? (f - baseFret + 1) : f];
            });

            const card = document.createElement('div');
            card.className = 'chord-card';
            card.onclick = () => {
                voicingState[name]++;
                updateChords();
            };
            card.innerHTML = `<p class="chord-name">${name}</p>`;
            const diagram = document.createElement('div');
            new vexchords.ChordBox(diagram, { 
                width: 160, height: 180, circleRadius: 4, numFrets: 5, strokeWidth: 2 
            }).draw({ chord: chordFormat, position: baseFret });
            container.appendChild(card).appendChild(diagram);
        }

        function updateChords() {
            const input = document.getElementById('progression').value;
            const container = document.getElementById('chord-container');
            container.innerHTML = '';
            input.trim().split(/\s+/).forEach(name => name && drawChord(name, container));
        }
        updateChords();
    </script>
</body>
</html>
